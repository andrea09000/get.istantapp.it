[build]
  # Invite + association files only (second Netlify site on get.istantapp.it).
  publish = "public"
  command = ""

# Serve required association files with JSON content-type (no redirects)
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"

# Some hosts treat dot-directories specially; provide a non-dot mirror
[[headers]]
  for = "/well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"

[[redirects]]
  from = "/.well-known/apple-app-site-association"
  to = "/well-known/apple-app-site-association"
  status = 200

[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/well-known/assetlinks.json"
  status = 200

# Invite deep links: always serve the same HTML (token is read from path in JS)
[[redirects]]
  from = "/invite"
  to = "/invite/"
  status = 302

[[redirects]]
  from = "/invite/*"
  to = "/invite/index.html"
  status = 200
