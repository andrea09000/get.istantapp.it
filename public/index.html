<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Istant — Inviti</title>
    <meta name="robots" content="noindex" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #0b0b0c;
        color: #fff;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 520px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.04);
        border-radius: 18px;
        padding: 20px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 20px;
      }
      p {
        margin: 0 0 14px;
        color: rgba(255, 255, 255, 0.75);
        font-weight: 600;
        line-height: 1.4;
      }
      a {
        color: #fff;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Istant</h1>
        <p>
          Questo dominio serve ai <strong>link di invito</strong> (es. <code style="color: rgba(255,255,255,0.9)">/invite/…</code>).
        </p>
        <p style="margin-bottom: 0">
          Apri il link che ti hanno mandato: si aprirà l’app se è installata. Il sito principale è
          <a href="https://istantapp.it" rel="noopener">istantapp.it</a>.
        </p>
      </div>
    </div>
  </body>
</html>
